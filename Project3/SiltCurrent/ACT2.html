<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find My Pages PT 2</title>
    <link rel="icon" type="Favicon" href="assets/Pictures/Favicon.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <section id="image-frame">
      <!-- ASCII images -->
      <pre id="ascii">Ascii Image here</pre>
    </section>
    <!-- Map Image -->
    <img id="map" src="assets/Pictures/Favicon.png" />
    <section id="story-frame">
      <!-- Narration -->
      <p id="story">Narration</p>

      <!-- Choices -->
      <div id="choices">Choice</div>

      <!-- Reset -->
      <p id="reset" class="choice" style="display: none">Restart</p>
    </section>
    <!-- Background Audio -->
    <audio id="background_audio" autoplay loop muted>
      <source
        src="assets/audio/Quasimorph OST - Familiar Place (Ur Phase 1, no bramfatura) - Quasimorph.mp3"
      />
    </audio>

    <!--Buttons-->
    <button id="map-button">Press 'K' to Show Map</button>
    <button id="mute-button">Press 'M' to Mute Music</button>

    <script src="assets/js/ascii.js"></script>
    <script src="assets/js/act2_script.js"></script>
  </body>
</html>

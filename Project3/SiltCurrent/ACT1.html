<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find My Pages PT 1</title>
    <link rel="icon" type="Favicon" href="assets/Pictures/Favicon.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div id="BlackBox"></div>
    <section id="image-frame">
      <!-- ASCII images -->
      <pre id="ascii">Ascii Image here</pre>
      <pre id="GameTitle">Title Of the Game here</pre>
    </section>

    <section id="story-frame">
      <!-- Narration -->
      <p id="story">Narration</p>

      <!-- Choices -->
      <div id="choices">Choice</div>

      <!-- Reset -->
      <p id="reset" class="choice" style="display: none">Restart</p>
    </section>
    <!-- Background Audio -->
    <audio id="background_audio" autoplay loop muted>
      <source src="assets/audio/campaign_mysterious_encounter_02.ogg" />
    </audio>

    <!--Buttons-->
    <button id="mute-button">Press 'M' to Mute Music</button>

    <script src="assets/js/ascii.js"></script>
    <script src="assets/js/act1_script.js"></script>
  </body>
</html>
